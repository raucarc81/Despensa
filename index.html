  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g-dark:   #1B5E20;
      --g-mid:    #2E7D32;
      --g-bright: #4CAF50;
      --g-pale:   #A5D6A7;
      --g-soft:   #E8F5E9;
      --orange:   #E65100;
      --orange-l: #FF8F00;
      --red:      #C62828;
      --w100: rgba(255,255,255,1.00);
      --w85:  rgba(255,255,255,0.85);
      --w60:  rgba(255,255,255,0.60);
      --w30:  rgba(255,255,255,0.30);
      --w15:  rgba(255,255,255,0.15);
      --w08:  rgba(255,255,255,0.08);
      --font: 'Nunito', sans-serif;
      --r: 16px; --rs: 10px;
    }

    html, body { height: 100%; overflow: hidden; font-family: var(--font); }
    #root { height: 100%; }

    /* ── BACKGROUND ── */
    .bg-img {
      position: fixed; inset: 0; z-index: 0;
      background:
        url('https://images.unsplash.com/photo-1604719312566-8912e9227c6a?auto=format&fit=crop&w=1920&q=50')
        center/cover no-repeat;
      filter: blur(10px) grayscale(0.88) brightness(0.30);
      transform: scale(1.08);
    }
    .bg-grad {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(160deg,#0a1a0a 0%,#172e17 45%,#0a2020 100%);
    }

    /* ── APP SHELL ── */
    .app { position: relative; height: 100%; display: flex; flex-direction: column; z-index: 1; overflow: hidden; }

    /* ── HEADER ── */
    .hdr {
      background: rgba(18,50,18,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--w15);
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
      flex-shrink: 0; z-index: 100;
    }
    .hdr-left  { display: flex; align-items: center; gap: 10px; }
    .hdr-logo  { font-size: 28px; line-height: 1; }
    .hdr-title { color: #fff; font-size: 19px; font-weight: 900; letter-spacing: -0.3px; }
    .hdr-sub   { color: var(--g-pale); font-size: 11px; font-weight: 600; }
    .hdr-right { display: flex; align-items: center; gap: 8px; }
    .hdr-btn {
      position: relative; background: var(--w15);
      border: 1px solid var(--w30); border-radius: 50%;
      width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: #fff; transition: all 0.18s; flex-shrink: 0;
    }
    .hdr-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
    .hdr-btn.on { background: var(--orange); border-color: var(--orange); }
    .bdg {
      position: absolute; top: -4px; right: -4px;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 900; border-radius: 10px;
      min-width: 18px; height: 18px; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--g-dark);
    }

    /* ── CATEGORY NAV ── */
    .cat-nav {
      background: rgba(6,20,6,0.55);
      backdrop-filter: blur(10px);
      padding: 8px 10px;
      border-bottom: 1px solid var(--w08);
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav-inner { display: flex; gap: 7px; width: max-content; }
    .cat-tab {
      background: var(--w08); border: 1px solid var(--w15);
      border-radius: 20px; padding: 6px 13px;
      color: var(--w60); font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .cat-tab.active { background: var(--g-bright); border-color: var(--g-bright); color: #fff; box-shadow: 0 2px 10px rgba(76,175,80,0.45); }
    .cat-tab:active { transform: scale(0.95); }
    .cat-tab-add { background: var(--w08); border: 1px dashed var(--w30); color: var(--w30); font-size: 16px; padding: 6px 12px; }

    /* ── MAIN SCROLL ── */
    .scroll {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 10px 10px 88px;
      scrollbar-width: thin; scrollbar-color: var(--w15) transparent;
    }

    /* ── SUBCAT SECTION ── */
    .sc {
      margin-bottom: 9px; border-radius: var(--r);
      background: var(--w08); backdrop-filter: blur(12px);
      border: 1px solid var(--w15); overflow: hidden;
    }
    .sc-hdr {
      padding: 11px 14px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
    }
    .sc-hdr:active { background: var(--w08); }
    .sc-title { color: #fff; font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .sc-cnt {
      background: var(--w15); color: var(--w60);
      font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 9px;
    }
    .sc-cnt.cart { background: rgba(230,81,0,0.65); color: #fff; }
    .sc-arrow { color: var(--w30); font-size: 12px; transition: transform 0.2s; }
    .sc-arrow.open { transform: rotate(90deg); }
    .sc-body { border-top: 1px solid var(--w08); }
    .sc-add {
      padding: 9px 14px; display: flex; align-items: center; gap: 7px;
      color: var(--g-pale); font-size: 12px; font-weight: 700; cursor: pointer;
      border-top: 1px solid var(--w08);
    }
    .sc-add:active { background: var(--w08); }
    .add-sc-btn {
      background: var(--w08); border: 1px dashed var(--w30);
      border-radius: var(--r); padding: 11px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      color: var(--w30); font-size: 13px; font-weight: 700;
      cursor: pointer; margin-bottom: 9px;
    }
    .add-sc-btn:active { background: var(--w15); }

    /* ── PRODUCT CARD ── */
    .pc {
      padding: 9px 13px; display: flex; align-items: center; gap: 9px;
      border-bottom: 1px solid var(--w08); position: relative;
    }
    .pc:last-child { border-bottom: none; }
    .pc.incart { background: rgba(230,81,0,0.07); }
    .pc-cart-ico { font-size: 17px; cursor: pointer; flex-shrink: 0; }
    .pc-info { flex: 1; min-width: 0; }
    .pc-name { color: #fff; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
    .pc-super {
      background: var(--w15); color: var(--w60);
      font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .pc-min { color: var(--w30); font-size: 10px; }
    .pc-who { color: rgba(165,214,167,0.6); font-size: 10px; }
    .pc-ctrl { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .qbtn {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; font-weight: 700; line-height: 1;
      transition: transform 0.12s, background 0.12s;
    }
    .qbtn:active { transform: scale(0.88); }
    .qbtn-m { background: var(--w15); color: var(--w85); }
    .qbtn-m:active { background: rgba(255,80,80,0.35); }
    .qbtn-p { background: var(--g-bright); color: #fff; }
    .qbtn-p:active { background: var(--g-mid); }
    .qnum { min-width: 28px; text-align: center; color: #fff; font-size: 16px; font-weight: 900; }
    .qnum.zero { color: var(--w30); }
    .qnum.low  { color: #FFB74D; }
    .kb { background: none; border: none; color: var(--w30); font-size: 17px; cursor: pointer; padding: 3px 2px; border-radius: 4px; }
    .kb:active { background: var(--w08); }

    /* ── CONTEXT MENU ── */
    .ctxm {
      position: absolute; right: 6px; top: 34px;
      background: #152a15; border: 1px solid var(--w15);
      border-radius: 12px; padding: 5px; z-index: 50;
      min-width: 155px; box-shadow: 0 8px 30px rgba(0,0,0,0.55);
    }
    .ctxi {
      padding: 9px 11px; color: var(--w85); font-size: 13px; font-weight: 700;
      cursor: pointer; border-radius: 7px; display: flex; align-items: center; gap: 7px;
    }
    .ctxi:active { background: var(--w08); }
    .ctxi.del { color: #EF9A9A; }

    /* ── CART VIEW ── */
    .cart-hdr { padding: 12px 14px 6px; display: flex; align-items: center; justify-content: space-between; }
    .cart-ttl { color: #fff; font-size: 17px; font-weight: 900; }
    .cart-tog { display: flex; background: var(--w08); border-radius: 20px; padding: 2px; }
    .ctog-btn { padding: 5px 11px; border-radius: 18px; border: none; background: transparent; color: var(--w60); font-family: var(--font); font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.18s; }
    .ctog-btn.on { background: var(--orange); color: #fff; }
    .csec-lbl { padding: 7px 14px 5px; color: var(--g-pale); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.7px; }
    .ci {
      background: var(--w08); border: 1px solid var(--w15);
      border-radius: var(--rs); padding: 11px 12px;
      margin: 0 0 7px; display: flex; align-items: center; gap: 10px;
    }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { color: #fff; font-size: 14px; font-weight: 800; }
    .ci-bread { color: var(--w30); font-size: 10px; margin-top: 2px; }
    .ci-who  { color: rgba(165,214,167,0.55); font-size: 10px; margin-top: 1px; }
    .ci-super { background: rgba(230,81,0,0.25); color: #FFB74D; font-size: 9px; font-weight: 900; padding: 2px 7px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0; }
    .ci-acts { display: flex; gap: 5px; flex-shrink: 0; }
    .ca-btn { padding: 7px 10px; border-radius: 8px; border: none; font-family: var(--font); font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
    .ca-btn:active { transform: scale(0.95); }
    .ca-ok  { background: var(--g-bright); color: #fff; }
    .ca-rm  { background: var(--w08); color: var(--w60); }
    .empty { text-align: center; padding: 56px 20px; color: var(--w30); }
    .empty-ico { font-size: 56px; margin-bottom: 14px; }
    .empty-t { font-size: 18px; font-weight: 800; }
    .empty-s { font-size: 13px; margin-top: 6px; }

    /* ── BOTTOM NAV ── */
    .bnav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,18,8,0.92); backdrop-filter: blur(20px);
      border-top: 1px solid var(--w08);
      padding: 7px 0 calc(7px + env(safe-area-inset-bottom));
      display: flex; z-index: 100;
    }
    .bnav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; padding: 3px 0;
      color: var(--w30); font-size: 10px; font-weight: 800; position: relative;
    }
    .bnav-btn.on { color: var(--g-bright); }
    .bnav-ico { font-size: 22px; position: relative; }

    /* ── MODALS ── */
    .ovl {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      backdrop-filter: blur(5px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      background: #142014; border-radius: 22px 22px 0 0;
      padding: 18px 18px calc(20px + env(safe-area-inset-bottom));
      width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto;
      border-top: 1px solid var(--w15);
    }
    .drag { width: 38px; height: 4px; background: var(--w15); border-radius: 2px; margin: 0 auto 18px; }
    .m-ttl { color: #fff; font-size: 17px; font-weight: 900; margin-bottom: 18px; text-align: center; }
    .fg { margin-bottom: 13px; }
    .fl { color: var(--w60); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
    .fi {
      width: 100%; background: var(--w08); border: 1px solid var(--w15);
      border-radius: 9px; padding: 10px 13px; color: #fff;
      font-family: var(--font); font-size: 15px; font-weight: 600; outline: none;
    }
    .fi:focus { border-color: var(--g-bright); }
    .fi::placeholder { color: var(--w30); font-weight: 500; }
    .fsel {
      width: 100%; background: var(--w08); border: 1px solid var(--w15);
      border-radius: 9px; padding: 10px 13px; color: #fff;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      outline: none; appearance: none; cursor: pointer;
    }
    .fsel option { background: #142014; color: #fff; }
    .f-row { display: flex; gap: 10px; }
    .f-row .fg { flex: 1; }
    .m-acts { display: flex; gap: 9px; margin-top: 18px; }
    .btn { flex: 1; padding: 13px; border-radius: 11px; border: none; font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer; }
    .btn:active { transform: scale(0.97); }
    .btn-p { background: var(--g-bright); color: #fff; }
    .btn-s { background: var(--w08); color: var(--w60); }
    .btn-d { background: rgba(198,40,40,0.7); color: #fff; }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .ep {
      background: var(--w08); border: 1px solid var(--w15);
      border-radius: 8px; width: 40px; height: 40px;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .ep.sel { background: rgba(76,175,80,0.25); border-color: var(--g-bright); }

    /* ── WELCOME ── */
    .wlc {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
    }
    .wlc-logo { font-size: 72px; margin-bottom: 14px; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
    .wlc-ttl { color: #fff; font-size: 30px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .wlc-sub { color: var(--g-pale); font-size: 15px; font-weight: 600; margin-bottom: 40px; }
    .wlc-card {
      background: var(--w08); backdrop-filter: blur(20px);
      border: 1px solid var(--w15); border-radius: 20px;
      padding: 26px 22px; width: 100%; max-width: 340px;
    }
    .wlc-lbl { color: var(--w60); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 9px; display: block; }
    .wlc-inp {
      width: 100%; background: rgba(255,255,255,0.1);
      border: 1px solid var(--w30); border-radius: 12px;
      padding: 13px 16px; color: #fff; font-family: var(--font);
      font-size: 20px; font-weight: 900; outline: none;
      margin-bottom: 18px; text-align: center;
    }
    .wlc-inp:focus { border-color: var(--g-bright); }
    .wlc-inp::placeholder { color: var(--w30); font-weight: 500; font-size: 16px; }

    /* ── LOADING ── */
    .ldg { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; gap: 14px; }
    .spin { width: 38px; height: 38px; border: 3px solid var(--w15); border-top-color: var(--g-bright); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ldg-txt { color: var(--w60); font-size: 14px; font-weight: 700; }

    /* ── TOAST ── */
    .tbox { position: fixed; top: 78px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 7px; width: 90%; max-width: 390px; pointer-events: none; }
    .toast {
      background: rgba(18,42,18,0.97); backdrop-filter: blur(18px);
      border: 1px solid var(--w15); border-radius: 11px;
      padding: 11px 15px; color: #fff; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 18px rgba(0,0,0,0.45); animation: tin 0.28s ease;
    }
    .toast.ok  { border-color: var(--g-pale); }
    .toast.wrn { border-color: #FFB74D; }
    @keyframes tin { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }

    /* ── MISC ── */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    @media (min-width: 480px) {
      .ovl { align-items: center; }
      .sheet { border-radius: 22px; margin: 14px; max-height: 80vh; }
    }
  </style>
</head>

/* ════════════════ SEED ════════════════ */
async function seedData() {
  const snap = await db.ref('market/categories').once('value');
  if (snap.exists()) return;
  const upd = {};
  const ids = {};
  INIT_CATS.forEach(cat => {
    const id = db.ref('market/categories').push().key;
    ids[cat.name] = id;
    upd[`market/categories/${id}`] = {
      name: cat.name,
      emoji: cat.emoji,
      order: cat.order
    };
  });
  Object.entries(INIT_SC).forEach(([cn, subs]) => {
    const cid = ids[cn];
    if (!cid) return;
    subs.forEach((name, i) => {
      const id = db.ref('market/subcategories').push().key;
      upd[`market/subcategories/${id}`] = {
        name,
        categoryId: cid,
        order: i
      };
    });
  });
  await db.ref().update(upd);
}
